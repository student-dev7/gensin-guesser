# GitHub Actions から Vercel へ本番デプロイ（ビルドは GHA 上、Vercel には成果物のみアップロード）
# 必要な Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# 取得: Vercel → Account Settings → Tokens / ローカル .vercel/project.json の orgId・projectId
# Vercel の「Git 連携」でも同じリポジトリが自動デプロイされる場合は二重になるので、
# どちらか一方にする（例: このワークフローのみ使うなら Vercel 側の自動デプロイをオフ）
name: Deploy to Vercel (Production)

# checkout / setup-node 等の Action 実行環境を Node 24 に（Node 20 ランナー廃止前の推奨）
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required GitHub secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN が空です。GitHub → Settings → Secrets and variables → Actions で、名前を正確に VERCEL_TOKEN として追加してください（Vercel → Account Settings → Tokens で作成）。"
            missing=1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error::VERCEL_ORG_ID が空です。同じく Repository secrets に追加してください（Vercel プロジェクト Settings → General の Project ID 付近、または .vercel/project.json の orgId）。"
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::VERCEL_PROJECT_ID が空です。同じく Repository secrets に追加してください。"
            missing=1
          fi
          exit $missing

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel env (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@51 pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@51 build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@51 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
