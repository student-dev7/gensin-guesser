# OpenNext でビルドし、Wrangler で Cloudflare Workers にデプロイ（Linux 上でビルド — Windows ローカルは symlink 制限あり）
# Secrets: CLOUDFLARE_API_TOKEN（必須）
#         NEXT_PUBLIC_FIREBASE_*（本番 Firebase。未設定だとビルド失敗のため、Repository secrets に追加）
name: Deploy Cloudflare Workers

on:
  push:
    branches: [cloudflare]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check CLOUDFLARE_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::GitHub → Settings → Secrets and variables → Actions で、名前を正確に CLOUDFLARE_API_TOKEN として API トークンを追加してください（値が空だと wrangler が失敗します）。"
            exit 1
          fi

      - name: Build OpenNext
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: npx opennextjs-cloudflare build

      - name: Debug — show eval patterns in bundle
        run: grep -R "eval(" .open-next --include="*.js" --include="*.mjs" 2>/dev/null | head -80 || true

      - name: Patch eval(require) for Workers runtime
        run: node scripts/patch-opennext-eval.mjs

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
